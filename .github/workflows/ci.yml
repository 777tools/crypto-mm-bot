name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python構文チェック
        run: python -m py_compile bot.py bot_v2.py backtest.py demo.py

      - name: PHP構文チェック
        run: php -l web/api.php

      - name: 依存インストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: pytest（mock/fixtureのみ・実取引なし）
        run: pytest -q tests/
